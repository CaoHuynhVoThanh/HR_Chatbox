<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HR CV Coach</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; background: #f7f8fa; color: #18212f; }
      section, form { background: white; border: 1px solid #dde3ea; border-radius: 10px; padding: 1rem; margin: 1rem 0; }
      #messages { min-height: 180px; max-height: 460px; overflow-y: auto; }
      .message { white-space: pre-wrap; padding: .75rem; margin: .5rem 0; border-radius: 8px; }
      .user { background: #dbeafe; margin-left: 14%; } .assistant { background: #eef2f7; margin-right: 14%; }
      textarea { box-sizing: border-box; width: 100%; min-height: 90px; } button { padding: .55rem .8rem; cursor: pointer; }
      .muted { color: #52606d; font-size: .9rem; } .error { color: #b42318; }
    </style>
  </head>
  <body>
    <h1>HR CV Coach</h1>
    <p class="muted">CV và hội thoại chỉ lưu trong sessionStorage của tab này; đóng tab sẽ xóa dữ liệu.</p>

    <section>
      <label for="cv-file"><strong>CV PDF hoặc DOCX</strong></label><br />
      <input id="cv-file" type="file" accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document" />
      <button id="upload-button" type="button">Dùng CV này</button>
      <p id="cv-status" class="muted">Chưa có CV.</p>
    </section>

    <section id="messages" aria-live="polite"></section>
    <form id="chat-form">
      <label for="message"><strong>Trao đổi về CV</strong></label>
      <textarea id="message" placeholder="Ví dụ: Hãy nhận xét CV của tôi."></textarea>
      <button type="submit">Gửi</button>
      <button id="clear-button" type="button">Xóa dữ liệu tab</button>
      <p id="error" class="error" role="alert"></p>
    </form>

    <script>
      const sessionKey = "hr-cv-chat-session-v1";
      const emptyState = () => ({ fileName: "", fileData: "", cvText: "", messages: [] });
      let state = loadState();

      function loadState() {
        try { return JSON.parse(sessionStorage.getItem(sessionKey)) || emptyState(); }
        catch { sessionStorage.removeItem(sessionKey); return emptyState(); }
      }
      function saveState() { sessionStorage.setItem(sessionKey, JSON.stringify(state)); }
      function setError(message = "") { document.getElementById("error").textContent = message; }
      function render() {
        document.getElementById("cv-status").textContent = state.fileName
          ? `Đang dùng: ${state.fileName}` : "Chưa có CV.";
        const messages = document.getElementById("messages");
        messages.replaceChildren();
        for (const message of state.messages) {
          const node = document.createElement("div");
          node.className = `message ${message.role}`;
          node.textContent = `${message.role === "user" ? "Bạn" : "HR CV Coach"}: ${message.content}`;
          messages.append(node);
        }
        messages.scrollTop = messages.scrollHeight;
      }
      function readAsDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader(); reader.onerror = reject;
          reader.onload = () => resolve(reader.result); reader.readAsDataURL(file);
        });
      }
      function turnsBeforeCurrent() {
        const turns = [];
        for (let index = 0; index + 1 < state.messages.length; index += 2) {
          const user = state.messages[index], assistant = state.messages[index + 1];
          if (user.role === "user" && assistant.role === "assistant") turns.push({ user: user.content, assistant: assistant.content });
        }
        return turns.slice(-20);
      }

      document.getElementById("upload-button").addEventListener("click", async () => {
        const file = document.getElementById("cv-file").files[0];
        if (!file) return setError("Hãy chọn CV trước.");
        if (file.size > 3 * 1024 * 1024) return setError("CV vượt quá giới hạn 3 MB của phiên trình duyệt.");
        setError("");
        try {
          const fileData = await readAsDataUrl(file);
          const form = new FormData(); form.append("file", file);
          const extraction = await fetch("/api/cv/extract", { method: "POST", body: form });
          const result = await extraction.json();
          if (!extraction.ok) throw new Error(result.detail || "Không thể đọc CV.");
          const nextState = { fileName: result.filename, fileData, cvText: result.text, messages: [] };
          sessionStorage.setItem(sessionKey, JSON.stringify(nextState));
          state = nextState; render();
        } catch (error) {
          setError(error.name === "QuotaExceededError" ? "CV quá lớn cho sessionStorage; hãy chọn file nhỏ hơn." : error.message);
        }
      });

      document.getElementById("chat-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const input = document.getElementById("message"), content = input.value.trim();
        if (!state.cvText) return setError("Hãy tải CV trước.");
        if (!content) return;
        const history = turnsBeforeCurrent();
        state.messages.push({ role: "user", content }); saveState(); render(); input.value = ""; setError("");
        try {
          const response = await fetch("/api/chat", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ cv_text: state.cvText, content, history })
          });
          const result = await response.json();
          if (!response.ok) throw new Error(result.detail || "Không thể gửi tin nhắn.");
          state.messages.push({ role: "assistant", content: result.assistant }); saveState(); render();
        } catch (error) { setError(error.message); }
      });
      document.getElementById("clear-button").addEventListener("click", () => {
        sessionStorage.removeItem(sessionKey); state = emptyState(); setError(""); render();
      });
      render();
    </script>
  </body>
</html>
